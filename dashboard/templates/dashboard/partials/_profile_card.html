<div class="dashboard-card p-4 h-100">
    <div class="d-flex align-items-start gap-3">
        <div class="avatar-placeholder flex-shrink-0">
            <i class="bi bi-person"></i>
        </div>
        <div class="min-w-0">
            <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
                <h2 class="h5 fw-bold mb-0">
                    {{ request.user.get_full_name|default:request.user.username }}
                </h2>
                <span class="badge rounded-pill text-bg-primary">{{ request.user.role|title }}</span>
            </div>
            <p class="text-secondary mb-2">{{ request.user.email|default:"No email added" }}</p>
            <div class="small text-secondary">
                <i class="bi bi-telephone me-1"></i>
                {{ request.user.phone_number|default:"No phone number added" }}
            </div>
        </div>
    </div>
</div>
